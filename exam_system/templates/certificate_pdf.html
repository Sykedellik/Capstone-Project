<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@page{
size:A4 portrait;
margin:1cm;
}

body{
font-family:Arial;
font-size:12px;
margin:0;
padding:0;
}

.wrapper{
padding:20px;
text-align:center;
}

.logo{
font-size:48px;
margin-bottom:30px;
}

.title{
font-size:42px;
font-weight:bold;
margin-bottom:60px;
letter-spacing:2px;
}

.small{
font-size:24px;
margin-bottom:15px;
}

.name{
font-size:48px;
font-weight:bold;
font-style:italic;
margin-bottom:50px;
margin-top:15px;
}

.exam{
font-size:32px;
font-weight:bold;
margin-top:25px;
margin-bottom:30px;
}

.subject{
font-size:26px;
margin-bottom:100px;
}

.signature{
margin-top:80px;
width:300px;
margin-left:auto;
margin-right:auto;
}

.signature hr{
border:none;
border-top:2px solid black;
}

.signature-label{
font-size:18px;
font-weight:bold;
}

.date{
margin-top:60px;
font-size:20px;
}

.print-btn-wrapper{
text-align:center;
margin:40px 0 20px;
}

@media print{
@page{
size:A4 portrait;
margin:1.5cm;
}

body{
margin:0;
padding:0;
}

.wrapper{
padding:20px;
}

.print-btn-wrapper{
display:none;
}
}

.print-btn{
padding:10px 20px;
font-size:14px;
font-weight:600;
background:#3b82f6;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
transition:background 0.2s;
}

.print-btn:hover{
background:#2563eb;
}
</style>
</head>
<body>
<div class="print-btn-wrapper">
<button onclick="window.print()" class="print-btn">Print Certificate</button>
</div>
<div class="wrapper">
<div class="logo">🏆</div>
<div class="title">CERTIFICATE OF COMPLETION</div>
<div class="small">This certifies that</div>
<div class="name">{{ student.username }}</div>
<div class="small">has successfully completed</div>
<div class="exam">{{ exam.title }}</div>
<div class="small">for</div>
<div class="subject">{{ subject.name }}</div>
<div class="signature">
<hr>
<div class="signature-label">Instructor Signature</div>
</div>
<div class="date">Issued {{ attempt.start_time|date:"d F, Y" }}</div>
</div>
</body>
</html>
