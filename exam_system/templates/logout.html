<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - Exam LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --text: #0f172a;
            --text-muted: #475569;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(30, 64, 175, 0.2) 0%, transparent 50%);
        }
        .logout-card {
            background: #ffffff;
            border-radius: 1.25rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        .logout-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.3);
        }
        .logout-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text);
            margin: 0;
            letter-spacing: -0.025em;
        }
        .logout-message {
            color: var(--text-muted);
            font-size: 1rem;
            margin: 1rem 0 2rem;
            line-height: 1.6;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.9375rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
        }
    </style>
</head>
<body>
    <div class="logout-card">
        <div class="logout-icon">
            <i data-lucide="check-circle" class="w-9 h-9"></i>
        </div>
        <h1 class="logout-title">You've Been Logged Out</h1>
        <p class="logout-message">
            Your session has ended successfully.
        </p>
        <meta http-equiv="refresh" content="5;url={% url 'login' %}">
        <a href="{% url 'login' %}" class="btn-primary">
            <i data-lucide="log-in" class="w-4 h-4"></i>
            Sign In Again
        </a>
    </div>

    <script>
        if (window.lucide) {
            window.lucide.createIcons();
        }
    </script>
</body>
</html>
